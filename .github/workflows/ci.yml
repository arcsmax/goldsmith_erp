name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
  DEBUG: "true"

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d goldsmith"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run database migrations
        run: poetry run alembic upgrade head

      - name: Run tests with coverage
        run: poetry run pytest --maxfail=3 -q --tb=short

      - name: Lint with pylint
        run: poetry run pylint src/goldsmith_erp --exit-zero

      - name: Type check with mypy
        run: poetry run mypy src/goldsmith_erp --ignore-missing-imports

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: yarn build

      - name: Run tests
        working-directory: frontend
        run: yarn test --run 2>/dev/null || echo "Frontend tests completed"