name: Goldsmith ERP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
  DEBUG: "true"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # Stage 1: Lint & Static Analysis
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: ./src
        run: poetry install --no-root
      - name: Check formatting (black)
        working-directory: ./src
        run: poetry run black --check goldsmith_erp/
      - name: Check import sorting (isort)
        working-directory: ./src
        run: poetry run isort --check-only goldsmith_erp/
      - name: Security scan (bandit)
        working-directory: ./src
        run: poetry run bandit -r goldsmith_erp/ -c pyproject.toml
      - name: Type checking (mypy)
        working-directory: ./src
        run: poetry run mypy goldsmith_erp/ --ignore-missing-imports

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile
      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

  # Stage 2: Tests
  test-backend:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: ./src
        run: poetry install --no-root
      - name: Run migrations
        working-directory: ./src
        run: poetry run alembic upgrade head
      - name: Run tests with coverage
        working-directory: ./src
        run: poetry run pytest ../tests/ --maxfail=3 -q --tb=short --cov=goldsmith_erp --cov-report=xml --cov-report=term --cov-fail-under=50
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/coverage.xml

  # F1 — integration tests against real Postgres (not SQLite).
  # Mirrors `test-backend` but sets TEST_DATABASE_URL so the integration
  # conftest binds to the PG service instead of its SQLite fallback.
  # Only runs tests/integration/, not the SQLite unit suite.
  # Ref: docs/fix-plan/2026-04-23/F1-pg-test-target.md
  test-integration-pg:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Both TEST_DATABASE_URL (integration conftest) and DATABASE_URL
      # (test skipif markers + app settings) must point at the PG service.
      TEST_DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
      # Non-secret test values — base64 of "testkey1234567890abcdefghijkl" and a
      # dummy salt. Kept inline rather than as GitHub secrets: they carry no
      # security meaning in CI (no real data is encrypted with them).
      ENCRYPTION_KEY: dGVzdGtleTEyMzQ1Njc4OTBhYmNkZWZnaGlqa2w=
      ANONYMIZATION_SALT: testsalt1234567890abcdef
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: ./src
        run: poetry install --no-root
      - name: Run migrations
        working-directory: ./src
        run: poetry run alembic upgrade head
      - name: Run integration tests against Postgres
        working-directory: ./src
        run: poetry run pytest ../tests/integration/ -v --tb=short --maxfail=5

  # F2 — alembic round-trip smoke (upgrade → downgrade → upgrade).
  # CI previously only verified forward migrations. Broken `downgrade()`
  # or FK-drop-order bugs only surfaced post-merge (see commit 263fd45
  # "3 real bugs caught by smoke-test against fresh PG" and F2a / H9).
  # This job fails the PR if any migration is non-reversible on a fresh
  # PG 15. alembic/env.py honors MIGRATION_DATABASE_URL (sync driver —
  # alembic runs synchronously, so we use `postgresql://` here even
  # though the app itself uses `postgresql+asyncpg://`).
  # Ref: docs/fix-plan/2026-04-23/F2-downgrade-smoke.md
  migration-smoke:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Sync driver URL for alembic (env.py uses engine_from_config).
      MIGRATION_DATABASE_URL: postgresql://user:pass@localhost:5432/goldsmith_test
      # Async driver URL for app settings imported during migration env load.
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
      ENCRYPTION_KEY: dGVzdGtleTEyMzQ1Njc4OTBhYmNkZWZnaGlqa2w=
      ANONYMIZATION_SALT: testsalt1234567890abcdef
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-root
      - name: Alembic upgrade → downgrade → upgrade round-trip
        run: |
          poetry run alembic upgrade head
          poetry run alembic downgrade base
          poetry run alembic upgrade head

  test-frontend:
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile
      - name: Run tests
        working-directory: ./frontend
        run: yarn test --run
      - name: Build check
        working-directory: ./frontend
        run: yarn build

  # Stage 3: Build Verification (PRs to main only)
  build-verify:
    if: github.event_name == 'pull_request'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend container
        run: docker build -f Containerfile -t goldsmith-backend:test .
      - name: Build frontend container
        run: docker build -f frontend/Containerfile -t goldsmith-frontend:test ./frontend
