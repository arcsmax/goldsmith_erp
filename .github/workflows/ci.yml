name: Goldsmith ERP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
  DEBUG: "true"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # Stage 1: Lint & Static Analysis
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: ./src
        run: poetry install
      - name: Check formatting (black)
        working-directory: ./src
        run: poetry run black --check goldsmith_erp/
      - name: Check import sorting (isort)
        working-directory: ./src
        run: poetry run isort --check-only goldsmith_erp/
      - name: Security scan (bandit)
        working-directory: ./src
        run: poetry run bandit -r goldsmith_erp/ -c pyproject.toml
      - name: Type checking (mypy)
        working-directory: ./src
        run: poetry run mypy goldsmith_erp/ --ignore-missing-imports

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile
      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

  # Stage 2: Tests
  test-backend:
    # Decoupled from `lint`: the backend lint gate (black/isort/mypy strict)
    # carries large pre-existing debt and cannot currently pass, which was
    # silently skipping the entire backend test suite. Tests now run on their
    # own merit; lint remains an advisory signal until the debt is paid down.
    runs-on: ubuntu-latest
    env:
      # Encryption-dependent tests (PII/valuation) need a key; the anonymization
      # suite needs the salt. Non-secret CI values (see test-integration-pg).
      ENCRYPTION_KEY: V0Ae_U1MhSkUCNugAmmQV7Jl2GnxkizHeurQnglXVOc=
      ANONYMIZATION_SALT: testsalt1234567890abcdef
      # Sync URL for the alembic round-trip test (test_migration_h9_roundtrip
      # prefers MIGRATION_TEST_DATABASE_URL; without it the test would feed the
      # async DATABASE_URL to a sync create_engine → MissingGreenlet).
      MIGRATION_TEST_DATABASE_URL: postgresql://user:pass@localhost:5432/goldsmith_test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: ./src
        run: poetry install
      - name: Run tests with coverage
        # Run from repo root so both `goldsmith_erp` (installed pkg) and the
        # `tests` package are importable; testpaths/rootdir resolve via the
        # root pyproject.toml. Running from ./src left repo root off sys.path,
        # breaking `import tests.*` in a few integration modules.
        run: poetry run python -m pytest tests/ --maxfail=3 -q --tb=short --cov=goldsmith_erp --cov-report=xml --cov-report=term --cov-fail-under=50
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  # F1 — integration tests against real Postgres (not SQLite).
  # Mirrors `test-backend` but sets TEST_DATABASE_URL so the integration
  # conftest binds to the PG service instead of its SQLite fallback.
  # Only runs tests/integration/, not the SQLite unit suite.
  # Ref: docs/fix-plan/2026-04-23/F1-pg-test-target.md
  test-integration-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Both TEST_DATABASE_URL (integration conftest) and DATABASE_URL
      # (test skipif markers + app settings) must point at the PG service.
      TEST_DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
      # Non-secret test values — a throwaway but *valid* 32-byte Fernet key
      # (the old dummy decoded to 29 bytes and raised "Fernet key must be 32
      # bytes") and a dummy salt. Kept inline rather than as GitHub secrets:
      # they carry no security meaning in CI (no real data is encrypted).
      ENCRYPTION_KEY: V0Ae_U1MhSkUCNugAmmQV7Jl2GnxkizHeurQnglXVOc=
      ANONYMIZATION_SALT: testsalt1234567890abcdef
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: ./src
        run: poetry install
      - name: Run integration tests against Postgres
        run: poetry run python -m pytest tests/integration/ -v --tb=short --maxfail=5

  # F2 — alembic round-trip smoke (upgrade → downgrade → upgrade).
  # CI previously only verified forward migrations. Broken `downgrade()`
  # or FK-drop-order bugs only surfaced post-merge (see commit 263fd45
  # "3 real bugs caught by smoke-test against fresh PG" and F2a / H9).
  # This job fails the PR if any migration is non-reversible on a fresh
  # PG 15. alembic/env.py honors MIGRATION_DATABASE_URL (sync driver —
  # alembic runs synchronously, so we use `postgresql://` here even
  # though the app itself uses `postgresql+asyncpg://`).
  # Ref: docs/fix-plan/2026-04-23/F2-downgrade-smoke.md
  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Sync driver URL for alembic (env.py uses engine_from_config).
      MIGRATION_DATABASE_URL: postgresql://user:pass@localhost:5432/goldsmith_test
      # Async driver URL for app settings imported during migration env load.
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
      ENCRYPTION_KEY: V0Ae_U1MhSkUCNugAmmQV7Jl2GnxkizHeurQnglXVOc=
      ANONYMIZATION_SALT: testsalt1234567890abcdef
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Alembic upgrade → downgrade → upgrade round-trip
        run: |
          poetry run alembic upgrade head
          poetry run alembic downgrade base
          poetry run alembic upgrade head

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile
      - name: Run tests
        working-directory: ./frontend
        run: yarn test --run
      - name: Build check
        working-directory: ./frontend
        run: yarn build

  # F3 — Playwright E2E specs against real backend + frontend + PG + Redis.
  # Runs smoke.spec.ts (structure, routing, ProtectedRoute redirect) and
  # auth.spec.ts (login failure paths; happy-path skips without
  # E2E_ADMIN_EMAIL/PASSWORD env).  The heavier domain specs
  # goldsmith-workflow.spec.ts and goldsmith-full.spec.ts are deferred
  # to a nightly workflow — keeps PR wall-time under the 8-min budget.
  # playwright.config.ts auto-starts Vite (`yarn dev`) via webServer, so
  # only the backend needs manual boot here.
  # Ref: docs/fix-plan/2026-04-23/F3-playwright-ci.md
  test-e2e:
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: goldsmith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIGRATION_DATABASE_URL: postgresql://user:pass@localhost:5432/goldsmith_test
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/goldsmith_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long-enough
      ENCRYPTION_KEY: V0Ae_U1MhSkUCNugAmmQV7Jl2GnxkizHeurQnglXVOc=
      ANONYMIZATION_SALT: testsalt1234567890abcdef
      DEBUG: "true"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend dependencies
        run: poetry install
      - name: Run migrations
        run: poetry run alembic upgrade head
      - name: Start backend (uvicorn, background)
        working-directory: ./src
        run: |
          poetry run uvicorn goldsmith_erp.main:app --host 0.0.0.0 --port 8000 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "Backend is up."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start within 60s" >&2
          exit 1
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E (smoke + auth only)
        working-directory: ./frontend
        run: npx playwright test e2e/smoke.spec.ts e2e/auth.spec.ts
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload Playwright test-results (screenshots, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

  # Stage 3: Build Verification (PRs to main only)
  build-verify:
    if: github.event_name == 'pull_request'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend container
        run: docker build -f Containerfile -t goldsmith-backend:test .
      - name: Build frontend container
        run: docker build -f frontend/Containerfile -t goldsmith-frontend:test ./frontend
