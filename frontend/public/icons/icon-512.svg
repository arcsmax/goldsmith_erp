<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle — warm gold -->
  <circle cx="256" cy="256" r="256" fill="#D4A843"/>
  <!-- Inner ring — deeper amber for depth -->
  <circle cx="256" cy="256" r="214" fill="none" stroke="#B8892A" stroke-width="10"/>
  <!-- Stylised ring/Fassung shape — top oval -->
  <ellipse cx="256" cy="182" rx="59" ry="37" fill="none" stroke="#FDFAF4" stroke-width="16" stroke-linecap="round"/>
  <!-- Gem facets — simple diamond silhouette -->
  <polygon points="256,145 315,182 256,219 197,182" fill="#FDFAF4" fill-opacity="0.9"/>
  <polygon points="256,219 315,182 256,307" fill="#E8D5A0" fill-opacity="0.8"/>
  <polygon points="256,219 197,182 256,307" fill="#C9A030" fill-opacity="0.8"/>
  <!-- Shank / band lines -->
  <line x1="208" y1="295" x2="176" y2="395" stroke="#FDFAF4" stroke-width="16" stroke-linecap="round"/>
  <line x1="304" y1="295" x2="336" y2="395" stroke="#FDFAF4" stroke-width="16" stroke-linecap="round"/>
  <line x1="176" y1="395" x2="336" y2="395" stroke="#FDFAF4" stroke-width="16" stroke-linecap="round"/>
</svg>
