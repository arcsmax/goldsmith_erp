<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background circle — warm gold -->
  <circle cx="96" cy="96" r="96" fill="#D4A843"/>
  <!-- Inner ring — deeper amber for depth -->
  <circle cx="96" cy="96" r="80" fill="none" stroke="#B8892A" stroke-width="4"/>
  <!-- Stylised ring/Fassung shape — top oval -->
  <ellipse cx="96" cy="68" rx="22" ry="14" fill="none" stroke="#FDFAF4" stroke-width="6" stroke-linecap="round"/>
  <!-- Gem facets — simple diamond silhouette -->
  <polygon points="96,54 118,68 96,82 74,68" fill="#FDFAF4" fill-opacity="0.9"/>
  <polygon points="96,82 118,68 96,115" fill="#E8D5A0" fill-opacity="0.8"/>
  <polygon points="96,82 74,68 96,115" fill="#C9A030" fill-opacity="0.8"/>
  <!-- Shank / band lines -->
  <line x1="78" y1="110" x2="66" y2="148" stroke="#FDFAF4" stroke-width="6" stroke-linecap="round"/>
  <line x1="114" y1="110" x2="126" y2="148" stroke="#FDFAF4" stroke-width="6" stroke-linecap="round"/>
  <line x1="66" y1="148" x2="126" y2="148" stroke="#FDFAF4" stroke-width="6" stroke-linecap="round"/>
</svg>
