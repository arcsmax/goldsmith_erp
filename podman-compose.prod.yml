version: "3.9"

# Podman Compose - Production Configuration for Goldsmith ERP
# Usage: podman-compose -f podman-compose.prod.yml up -d
# First-time setup: ./setup.sh

services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: goldsmith-db-prod
    # Pass only the variables Postgres actually needs – not the full .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goldsmith}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-goldsmith}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goldsmith} -d ${POSTGRES_DB:-goldsmith}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: goldsmith-redis-prod
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Containerfile
    container_name: goldsmith-backend-prod
    command: >
      bash -c "cd /app && poetry run alembic upgrade head &&
               cd /app/src && poetry run uvicorn goldsmith_erp.main:app
               --host 0.0.0.0 --port 8000
               --workers 2
               --no-access-log"
    env_file: .env.production
    volumes:
      - ./uploads:/app/uploads:Z
      - ./logs:/app/logs:Z
    ports:
      - "0.0.0.0:8000:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      args:
        - NODE_ENV=production
    container_name: goldsmith-frontend-prod
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
